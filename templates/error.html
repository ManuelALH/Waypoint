{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container text-center mt-5 pt-5">
    <i class="fas {{ error_icon }} fa-5x text-muted mb-4" style="opacity: 0.5;"></i>

    <h1 class="display-1 fw-bold text-dark">{{ error_code }}</h1>
    <h2 class="mb-4">{{ error_title }}</h2>

    <p class="lead text-muted mb-5">
        {{ error_message|safe }}
    </p>

    <a href="{% url 'home' %}" class="btn btn-primary btn-lg shadow-sm">
        <i class="fas fa-campground me-2"></i> Volver al Inicio
    </a>
</div>
{% endblock %}
