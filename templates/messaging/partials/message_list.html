{% load static %}

{% for msg in chat_history %}
<div class="message-row {% if msg.sender == request.user %}message-out{% else %}message-in{% endif %}">

    {% if msg.sender != request.user %}
    <img src="{% static 'img/avatars/' %}{{ msg.sender.avatar }}" alt="{{ msg.sender.username }}"
        class="message-avatar">
    {% endif %}

    <div class="message-bubble">
        <div class="message-text">
            {{ msg.body|linebreaksbr }}
        </div>
        <div class="message-time">
            {{ msg.created_at|date:"H:i" }}
            {% if msg.sender == request.user %}
            {% if msg.read_at %}
            <i class="fas fa-check-double text-primary"></i>
            {% else %}
            <i class="fas fa-check"></i>
            {% endif %}
            {% endif %}
        </div>
    </div>
</div>
{% empty %}
<div class="text-center mt-5">
    <p class="text-muted">No hay mensajes aún.</p>
</div>
{% endfor %}

<script>
    var objDiv = document.getElementById("messagesArea");
    objDiv.scrollTop = objDiv.scrollHeight;
</script>
